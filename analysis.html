<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tubulus Insight – Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="analysis">

<header class="cp-header">
  <div class="cp-header-inner">
    <div class="cp-brand">
      <div class="cp-logo-circle">TI</div>
      <div class="cp-brand-text">
        <div class="cp-brand-name">Tubulus Insight</div>
        <div class="cp-brand-subtitle">Hepatopancreas Nutrition Particle AI</div>
      </div>
    </div>

    <nav class="cp-nav">
      <a href="index.html" class="cp-nav-link">Training</a>
      <a href="analysis.html" class="cp-nav-link cp-nav-link-active">Analysis</a>
    </nav>
  </div>
</header>

<main class="cp-main">

  <!-- HERO -->
  <section class="cp-hero">
    <div class="cp-hero-text">
      <h1 class="cp-hero-title">Tubulus Analysis</h1>
      <p class="cp-hero-description">
        Upload hepatopancreas images and estimate nutrition particle percentage using the trained model.
      </p>
    </div>
  </section>

  <!-- ANALYSIS -->
  <section class="cp-section">
    <h2 class="cp-section-title">Analyze Images</h2>

    <div class="cp-card">

      <div class="cp-field-group">
        <label class="cp-field-label">Category</label>
        <select id="categorySelect" class="cp-select">
          <option value="post_larva">Post Larva</option>
          <option value="juvenile">Juvenile</option>
          <option value="shrimp">Shrimp</option>
        </select>
      </div>

      <div class="cp-field-group">
        <label class="cp-field-label">Images</label>
        <div class="cp-file-row">
          <input type="file" id="imageInput" accept="image/*" multiple class="cp-file-input">
          <label for="imageInput" class="cp-btn cp-btn-outline">Choose images</label>
          <span class="cp-file-label" id="fileLabel">No files selected</span>
        </div>
      </div>

      <button id="analyzeBtn" class="cp-btn cp-btn-primary">
        Analyze
      </button>

      <div id="loading" style="display:none;">Processing...</div>

      <div id="results" class="cp-log"></div>

    </div>
  </section>

</main>

<footer class="cp-footer">
  Tubulus Insight – Shrimp Hepatopancreas Analysis Tool
</footer>

<script type="module" src="analysis.js"></script>
</body>
</html>
