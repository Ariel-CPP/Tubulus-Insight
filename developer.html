<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tubulus Insight – Developer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- HEADER -->
<header class="cp-header">
  <div class="cp-header-inner">
    <div class="cp-brand">
      <div class="cp-logo-circle">TI</div>
      <div>
        <div class="cp-brand-name">Tubulus Insight</div>
        <div class="cp-brand-subtitle">Developer Dashboard</div>
      </div>
    </div>
  </div>
</header>

<main class="cp-main">

  <!-- LOGIN -->
  <section class="cp-section" id="loginSection">
    <div class="cp-card">

      <h2 class="cp-section-title">Developer Access</h2>

      <div class="cp-field-group">
        <input
          type="password"
          id="passwordInput"
          placeholder="Enter password"
          class="cp-input"
        />
      </div>

      <button id="loginBtn" class="cp-btn cp-btn-primary">
        Login
      </button>

      <div id="loginMsg" class="cp-helper-text"></div>

    </div>
  </section>

  <!-- DASHBOARD -->
  <section class="cp-section" id="dashboard" style="display:none;">

    <h2 class="cp-section-title">Dataset Statistics</h2>

    <div class="cp-card">
      <div id="statsTable"></div>
    </div>

  </section>

</main>

<footer class="cp-footer">
  <div class="cp-footer-content">
    <div class="cp-footer-title">
      Tubulus Insight – Shrimp Hepatopancreas Analysis Tool
    </div>
    <div class="cp-footer-sub">
      Animal Health Laboratory - Technology Division
    </div>
    <div class="cp-footer-sub">
      Central Proteina Prima
    </div>
    <div class="cp-footer-year">
      2026
    </div>
  </div>
</footer>

<script type="module" src="developer.js"></script>

</body>
</html>
