<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tubulus Insight - Train</title>
  <style>
    body {
      font-family: Arial;
      max-width: 600px;
      margin: 40px auto;
    }
    h1 {
      text-align: center;
    }
    .box {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 10px;
    }
    img {
      max-width: 100%;
      margin-top: 10px;
      border-radius: 8px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      width: 100%;
      cursor: pointer;
    }
    .loading {
      display: none;
      margin-top: 10px;
      color: blue;
    }
    .success {
      color: green;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>Train Model</h1>

<div class="box">

  <input type="file" id="imageInput" accept="image/*"><br>

  <img id="preview" />

  <label>Percentage (%)</label>
  <input type="number" id="percentage" min="0" max="100">

  <label>Category</label>
  <select id="category">
    <option value="post_larva">Post Larva</option>
    <option value="juvenile">Juvenile</option>
    <option value="shrimp">Shrimp</option>
  </select>

  <button onclick="train()">Add Training Sample</button>

  <div class="loading" id="loading">Processing...</div>
  <div class="success" id="success"></div>

</div>

<script type="module">
import { extractFeatures } from "./js/feature.js";
import { computeHash } from "./js/hash.js";
import { addSample } from "./js/model.js";

let currentFile = null;

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

input.addEventListener("change", () => {
  const file = input.files[0];
  if (!file) return;

  currentFile = file;
  preview.src = URL.createObjectURL(file);
});

window.train = async function () {
  const percent = document.getElementById("percentage").value;
  const category = document.getElementById("category").value;
  const loading = document.getElementById("loading");
  const success = document.getElementById("success");

  success.innerText = "";

  if (!currentFile) {
    alert("Please upload image");
    return;
  }

  if (percent === "" || percent < 0 || percent > 100) {
    alert("Invalid percentage");
    return;
  }

  loading.style.display = "block";

  try {
    const feature = await extractFeatures(currentFile);
    const hash = await computeHash(currentFile);

    addSample(category, feature, percent, hash);

    loading.style.display = "none";
    success.innerText = "Training sample added!";
  } catch (err) {
    loading.style.display = "none";
    alert("Error processing image");
  }
};
</script>

</body>
</html>
